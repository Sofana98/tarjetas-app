<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Tarjetas S&G">
<title>Tarjetas Sofi & Guille</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 16px; }
body { background: #F5F4F0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #1A1916; min-height: 100vh; }
.app { max-width: 430px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
.header { background: #fff; border-bottom: 1px solid #E8E4DC; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 20; }
.header-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
.header-sub { font-size: 12px; color: #888; margin-top: 1px; }
.sync-pill { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 20px; }
.sync-pill.ok { background: #F0FDF4; color: #16A34A; border: 1px solid #BBF7D0; }
.sync-pill.syncing { background: #FFFBEB; color: #D97706; border: 1px solid #FDE68A; }
.sync-pill.error { background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.blink { animation: blink 1s infinite; }
.tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; background: #fff; border-bottom: 1px solid #E8E4DC; position: sticky; top: 61px; z-index: 19; }
.tab { padding: 13px 8px; text-align: center; font-size: 14px; font-weight: 500; color: #888; cursor: pointer; border-bottom: 2px solid transparent; }
.tab.active { color: #1A1916; border-bottom-color: #1A1916; }
.content { flex: 1; }
.section { display: none; padding: 14px 14px 80px; }
.section.active { display: block; }
.card { background: #fff; border: 1px solid #E8E4DC; border-radius: 14px; padding: 16px; margin-bottom: 12px; }
.field { margin-bottom: 15px; }
.field:last-child { margin-bottom: 0; }
.field > label { display: block; font-size: 11px; font-weight: 700; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.07em; }
.field input[type=text], .field input[type=number], .field input[type=date], .field select { width: 100%; font-size: 16px; color: #1A1916; background: #F5F4F0; border: 1px solid #E0DDD6; border-radius: 10px; padding: 11px 13px; font-family: inherit; outline: none; -webkit-appearance: none; appearance: none; }
.field input:focus, .field select:focus { border-color: #1A1916; background: #fff; }
.porc-row { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; }
.porc-row:last-child { margin-bottom: 0; }
.porc-row input { flex: 1; }
.porc-label { font-size: 14px; font-weight: 600; white-space: nowrap; min-width: 60px; }
.toggle-row { display: flex; gap: 8px; flex-wrap: wrap; }
.tb { flex: 1; min-width: 70px; padding: 12px 8px; border: 1.5px solid #E0DDD6; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; background: #F5F4F0; color: #888; font-family: inherit; text-align: center; -webkit-appearance: none; appearance: none; touch-action: manipulation; }
.tb.sel { background: #fff; border-color: #1A1916; color: #1A1916; }
.save-btn { width: 100%; padding: 15px; background: #1A1916; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 4px; -webkit-appearance: none; touch-action: manipulation; }
.save-btn:disabled { opacity: 0.45; }
.cancel-btn { width: 100%; padding: 13px; background: transparent; color: #888; border: 1px solid #E0DDD6; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 8px; touch-action: manipulation; }
.edit-banner { background: #EFF6FF; border: 1px solid #BFDBFE; border-radius: 10px; padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: #2563EB; font-weight: 600; }
.month-sel { margin-bottom: 12px; }
.month-sel select { width: 100%; font-size: 15px; background: #fff; border: 1px solid #E8E4DC; border-radius: 10px; padding: 10px 13px; font-family: inherit; -webkit-appearance: none; appearance: none; color: #1A1916; outline: none; }
.entry { padding: 12px 0; border-bottom: 1px solid #F0EDE6; }
.entry:last-child { border-bottom: none; }
.entry-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.entry-name { font-size: 15px; font-weight: 600; color: #1A1916; }
.entry-sub { font-size: 12px; color: #888; margin-top: 2px; }
.entry-right { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.entry-amount { font-size: 16px; font-weight: 700; color: #DC2626; }
.edit-btn { background: none; border: none; color: #aaa; cursor: pointer; font-size: 15px; padding: 4px 5px; touch-action: manipulation; }
.del-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 16px; padding: 4px 5px; touch-action: manipulation; }
.entry-meta { display: flex; gap: 5px; margin-top: 7px; flex-wrap: wrap; align-items: center; }
.badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
.b-cuota { background: #FFF7ED; color: #C2410C; }
.b-comp { background: #F0FDF4; color: #16A34A; }
.edate { font-size: 11px; color: #aaa; }
.empty { text-align: center; padding: 40px 20px; color: #aaa; font-size: 14px; }
.lmsg { text-align: center; padding: 32px; color: #aaa; font-size: 14px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.stat { background: #fff; border: 1px solid #E8E4DC; border-radius: 12px; padding: 13px 14px; }
.slabel { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
.sval { font-size: 18px; font-weight: 700; color: #1A1916; }
.sval.red { color: #DC2626; }
.tarjeta-card { background: #fff; border: 1px solid #E8E4DC; border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; }
.tarjeta-name { font-size: 14px; font-weight: 700; color: #1A1916; margin-bottom: 8px; }
.tarjeta-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; }
.tarjeta-label { color: #888; }
.tarjeta-val { font-weight: 600; color: #1A1916; }
.tarjeta-val.red { color: #DC2626; }
.tarjeta-val.sofi { color: #C9406A; }
.tarjeta-val.guille { color: #2563EB; }
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #1A1916; color: #fff; padding: 12px 22px; border-radius: 10px; font-size: 14px; font-weight: 600; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999; white-space: nowrap; max-width: 88vw; }
.toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="header-title">Tarjetas Sofi & Guille</div>
      <div class="header-sub" id="hdate"></div>
    </div>
    <div class="sync-pill syncing" id="spill">
      <div class="sync-dot blink" id="sdot"></div>
      <span id="stxt">Conectando</span>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" id="tbtn-cargar">Cargar</div>
    <div class="tab" id="tbtn-historial">Historial</div>
    <div class="tab" id="tbtn-resumen">Resumen</div>
  </div>
  <div class="content">
    <div id="tab-cargar" class="section active">
      <div id="edit-banner" class="edit-banner" style="display:none">✏️ Editando — modificá los campos y guardá</div>
      <div class="card">
        <div class="field">
          <label>Tarjeta</label>
          <select id="tarjeta">
            <option value="MACRO Sofi">MACRO Sofi</option>
            <option value="NARANJA Sofi">NARANJA Sofi</option>
            <option value="BBVA Guille">BBVA Guille</option>
            <option value="MACRO Guille">MACRO Guille</option>
            <option value="MERCADO PAGO Guille">MERCADO PAGO Guille</option>
          </select>
        </div>
        <div class="field">
          <label>Fecha</label>
          <input type="date" id="fecha" />
        </div>
        <div class="field">
          <label>Detalle</label>
          <input type="text" id="detalle" placeholder="Ej: Netflix, ropa, supermercado..." autocomplete="off" />
        </div>
        <div class="field">
          <label>Importe total ($)</label>
          <input type="number" id="importe" placeholder="0" inputmode="decimal" min="0" />
        </div>
        <div class="field">
          <label>Cuotas</label>
          <select id="cuotas">
            <option value="1">1 cuota (contado)</option>
            <option value="2">2 cuotas</option>
            <option value="3">3 cuotas</option>
            <option value="4">4 cuotas</option>
            <option value="6">6 cuotas</option>
            <option value="9">9 cuotas</option>
            <option value="12">12 cuotas</option>
            <option value="18">18 cuotas</option>
            <option value="24">24 cuotas</option>
          </select>
        </div>
        <div class="field">
          <label>¿Compartido?</label>
          <div class="toggle-row">
            <button type="button" class="tb" data-group="comp" data-val="Si">Sí</button>
            <button type="button" class="tb sel" data-group="comp" data-val="No">No</button>
          </div>
        </div>
        <div class="field" id="porc-field" style="display:none">
          <label>¿Cuánto paga cada uno?</label>
          <div class="porc-row">
            <span class="porc-label" style="color:#C9406A;">Sofi $</span>
            <input type="number" id="porc-sofi" placeholder="0" inputmode="decimal" min="0" />
          </div>
          <div class="porc-row">
            <span class="porc-label" style="color:#2563EB;">Guille $</span>
            <input type="number" id="porc-guille" placeholder="0" inputmode="decimal" min="0" readonly style="background:#eee;color:#888;" />
          </div>
        </div>
      </div>
      <button type="button" class="save-btn" id="savebtn">Guardar</button>
      <button type="button" class="cancel-btn" id="cancelbtn" style="display:none">Cancelar edición</button>
    </div>
    <div id="tab-historial" class="section">
      <div class="month-sel"><select id="hmes"></select></div>
      <div class="card" id="hlist"><div class="lmsg">Cargando...</div></div>
    </div>
    <div id="tab-resumen" class="section">
      <div class="month-sel"><select id="rmes"></select></div>
      <div id="rcontent"><div class="lmsg">Cargando...</div></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var SCRIPT='https://script.google.com/macros/s/AKfycbyGnm9bFTNzN3HJ2idbBZrl2WRspNGUEpAp6nv-UcPyA8DuiP-S9kGAzcgAwlv-b8T_/exec';
var CSV_BASE='https://docs.google.com/spreadsheets/d/e/2PACX-1vRjyeOsp51j38139qyFqtud031CxFCjf4P3kkYyzh8LBRQUpciVwOucShA9KZD58M0tva_v7_DOoy27/pub?single=true&output=csv&gid=1577857723';
var TARJETAS=['MACRO Sofi','NARANJA Sofi','BBVA Guille','MACRO Guille','MERCADO PAGO Guille'];
var MESES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
var state={comp:'No'};
var entries=[];
var editingId=null;

function todayStr(){
  var d=new Date();
  return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);
}
function sync(s){
  var p=document.getElementById('spill'),d=document.getElementById('sdot'),t=document.getElementById('stxt');
  p.className='sync-pill '+s;
  d.className='sync-dot'+(s==='syncing'?' blink':'');
  t.textContent=s==='ok'?'Sincronizado':s==='syncing'?'Sincronizando':'Sin conexión';
}
function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},2500);
}
function parseCSV(text){
  var lines=text.trim().split('\n');
  return lines.map(function(line){
    var result=[],cur='',inQ=false;
    for(var i=0;i<line.length;i++){
      var c=line[i];
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){result.push(cur.trim());cur='';}
      else{cur+=c;}
    }
    result.push(cur.trim());
    return result;
  });
}
function load(cb){
  sync('syncing');
  fetch(CSV_BASE+'&t='+Date.now())
    .then(function(r){return r.text();})
    .then(function(text){
      var rows=parseCSV(text);
      entries=rows.map(function(r){
        return {
          id:String(r[0]),fecha:r[1],tarjeta:r[2],detalle:r[3],
          importe:parseFloat(r[4])||0,cuotas:parseInt(r[5])||1,
          cuotaActual:parseInt(r[6])||1,compartido:r[7],
          montSofi:parseFloat(r[8])||0,montGuille:parseFloat(r[9])||0
        };
      }).filter(function(e){return e.detalle&&e.detalle.length>0;});
      sync('ok');fillMonths();if(cb)cb();
    })
    .catch(function(){sync('error');toast('Sin conexión');if(cb)cb();});
}
function post(body,cb){
  body.hoja='tarjetas';
  sync('syncing');
  fetch(SCRIPT,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)})
    .then(function(r){return r.text();})
    .then(function(){sync('ok');if(cb)cb(true);})
    .catch(function(){sync('error');if(cb)cb(false);});
}

document.getElementById('porc-sofi').addEventListener('input',function(){
  var imp=parseFloat(document.getElementById('importe').value)||0;
  var cuotas=parseInt(document.getElementById('cuotas').value)||1;
  var impCuota=imp/cuotas;
  var vs=parseFloat(this.value)||0;
  if(vs>impCuota)vs=impCuota;
  document.getElementById('porc-guille').value=Math.max(0,impCuota-vs).toFixed(0);
});

document.getElementById('importe').addEventListener('input',function(){
  var imp=parseFloat(this.value)||0;
  var cuotas=parseInt(document.getElementById('cuotas').value)||1;
  var impCuota=imp/cuotas;
  if(state.comp==='Si'){
    var vs=parseFloat(document.getElementById('porc-sofi').value)||0;
    document.getElementById('porc-guille').value=Math.max(0,impCuota-vs).toFixed(0);
  }
});

document.getElementById('cuotas').addEventListener('change',function(){
  var imp=parseFloat(document.getElementById('importe').value)||0;
  var cuotas=parseInt(this.value)||1;
  var impCuota=imp/cuotas;
  if(state.comp==='Si'){
    document.getElementById('porc-sofi').value=Math.round(impCuota/2);
    document.getElementById('porc-guille').value=Math.round(impCuota/2);
  }
});

function handleToggle(btn){
  var group=btn.getAttribute('data-group');
  var val=btn.getAttribute('data-val');
  btn.closest('.toggle-row').querySelectorAll('[data-group]').forEach(function(b){b.classList.remove('sel');});
  btn.classList.add('sel');
  state[group]=val;
  if(group==='comp'){
    document.getElementById('porc-field').style.display=val==='Si'?'':'none';
    if(val==='Si'){
      var imp=parseFloat(document.getElementById('importe').value)||0;
      var cuotas=parseInt(document.getElementById('cuotas').value)||1;
      var impCuota=imp/cuotas;
      document.getElementById('porc-sofi').value=Math.round(impCuota/2);
      document.getElementById('porc-guille').value=Math.round(impCuota/2);
    }
  }
}
document.addEventListener('click',function(e){
  var btn=e.target.closest('[data-group]');
  if(btn) handleToggle(btn);
});
document.getElementById('tbtn-cargar').addEventListener('click',function(){showTab('cargar');});
document.getElementById('tbtn-historial').addEventListener('click',function(){showTab('historial');});
document.getElementById('tbtn-resumen').addEventListener('click',function(){showTab('resumen');});
document.getElementById('hmes').addEventListener('change',renderHist);
document.getElementById('rmes').addEventListener('change',renderRes);

function showTab(t){
  ['cargar','historial','resumen'].forEach(function(n){
    document.getElementById('tab-'+n).classList.toggle('active',n===t);
    document.getElementById('tbtn-'+n).classList.toggle('active',n===t);
  });
  if(t==='historial')load(renderHist);
  if(t==='resumen')load(renderRes);
}
function mk(f){
  var d=new Date(f);
  if(isNaN(d.getTime()))return '';
  return d.getFullYear()+'-'+d.getMonth();
}
function ars(n){return '$'+Math.round(n).toLocaleString('es-AR');}
function fillMonths(){
  var keys=[];
  entries.forEach(function(e){var k=mk(e.fecha);if(k&&keys.indexOf(k)<0)keys.push(k);});
  keys.sort().reverse();
  var now=new Date(),cur=now.getFullYear()+'-'+now.getMonth();
  if(keys.indexOf(cur)<0)keys.unshift(cur);
  var opts=keys.map(function(k){var p=k.split('-');return '<option value="'+k+'">'+MESES[+p[1]]+' '+p[0]+'</option>';}).join('');
  document.getElementById('hmes').innerHTML=opts;
  document.getElementById('rmes').innerHTML=opts;
}
function resetForm(){
  editingId=null;
  document.getElementById('edit-banner').style.display='none';
  document.getElementById('savebtn').textContent='Guardar';
  document.getElementById('cancelbtn').style.display='none';
  document.getElementById('detalle').value='';
  document.getElementById('importe').value='';
  document.getElementById('fecha').value=todayStr();
  document.getElementById('cuotas').value='1';
  document.getElementById('porc-sofi').value='';
  document.getElementById('porc-guille').value='';
  document.getElementById('porc-field').style.display='none';
  state.comp='No';
  document.querySelectorAll('[data-group="comp"]').forEach(function(b){b.classList.remove('sel');});
  document.querySelector('[data-group="comp"][data-val="No"]').classList.add('sel');
}
document.getElementById('cancelbtn').addEventListener('click',resetForm);

document.getElementById('savebtn').addEventListener('click',function(){
  var imp=parseFloat(document.getElementById('importe').value);
  if(!imp||imp<=0){toast('Ingresá un importe válido');return;}
  var det=document.getElementById('detalle').value.trim();
  if(!det){toast('Ingresá un detalle');return;}
  var fechaVal=document.getElementById('fecha').value;
  if(!fechaVal){toast('Ingresá una fecha');return;}
  var cuotas=parseInt(document.getElementById('cuotas').value)||1;
  var cuotaImp=imp/cuotas;
  var mSofi=state.comp==='Si'?parseFloat(document.getElementById('porc-sofi').value)||0:0;
  var mGuille=state.comp==='Si'?parseFloat(document.getElementById('porc-guille').value)||0:0;
  if(state.comp==='Si'&&(mSofi+mGuille)<=0){toast('Ingresá cuánto paga cada uno');return;}
  var tarjeta=document.getElementById('tarjeta').value;
  var btn=document.getElementById('savebtn');
  btn.disabled=true;btn.textContent='Guardando...';
  var baseId=editingId||Date.now()+'';
  var fechaBase=new Date(fechaVal+'T12:00:00');
  var saved=0;

  function saveNext(){
    if(saved>=cuotas){
      btn.disabled=false;btn.textContent='Guardar';
      toast(cuotas>1?'¡'+cuotas+' cuotas guardadas!':'¡Guardado!');
      resetForm();
      setTimeout(function(){load();},2000);
      return;
    }
    var fechaCuota=new Date(fechaBase);
    fechaCuota.setMonth(fechaCuota.getMonth()+saved);
    var body={
      action:saved===0&&editingId?'edit':'add',
      id:saved===0?baseId:(baseId+'_c'+(saved+1)),
      fecha:fechaCuota.toISOString(),
      tarjeta:tarjeta,
      detalle:det+(cuotas>1?' (cuota '+(saved+1)+'/'+cuotas+')':''),
      importe:Math.round(cuotaImp),
      cuotas:cuotas,
      cuotaActual:saved+1,
      compartido:state.comp,
      porcentajeSofi:mSofi,
      porcentajeGuille:mGuille
    };
    post(body,function(ok){
      if(ok){saved++;saveNext();}
      else{btn.disabled=false;btn.textContent='Guardar';toast('Error al guardar');}
    });
  }
  saveNext();
});

function editEntry(id){
  var e=null;
  for(var i=0;i<entries.length;i++){if(entries[i].id===id){e=entries[i];break;}}
  if(!e)return;
  editingId=id;
  showTab('cargar');
  document.getElementById('edit-banner').style.display='';
  document.getElementById('savebtn').textContent='Guardar cambios';
  document.getElementById('cancelbtn').style.display='';
  var tarEl=document.getElementById('tarjeta');
  for(var t=0;t<tarEl.options.length;t++){if(tarEl.options[t].value===e.tarjeta){tarEl.selectedIndex=t;break;}}
  var d=new Date(e.fecha);
  if(!isNaN(d.getTime())){document.getElementById('fecha').value=d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
  document.getElementById('detalle').value=e.detalle;
  document.getElementById('importe').value=e.importe;
  document.getElementById('cuotas').value=e.cuotas;
  state.comp=e.compartido;
  document.querySelectorAll('[data-group="comp"]').forEach(function(b){b.classList.remove('sel');});
  var cb=document.querySelector('[data-group="comp"][data-val="'+e.compartido+'"]');
  if(cb)cb.classList.add('sel');
  document.getElementById('porc-field').style.display=e.compartido==='Si'?'':'none';
  document.getElementById('porc-sofi').value=e.montSofi||'';
  document.getElementById('porc-guille').value=e.montGuille||'';
  window.scrollTo(0,0);
}

function renderHist(){
  var key=document.getElementById('hmes').value;
  var list=entries.filter(function(e){return mk(e.fecha)===key;});
  list.sort(function(a,b){return new Date(b.fecha)-new Date(a.fecha);});
  var el=document.getElementById('hlist');
  if(!list.length){el.innerHTML='<div class="empty">Sin registros este mes</div>';return;}
  el.innerHTML=list.map(function(e){
    var cuotaLabel=e.cuotas>1?'Cuota '+e.cuotaActual+'/'+e.cuotas:'Contado';
    var compLabel=e.compartido==='Si'?'Sofi '+ars(e.montSofi)+' · Guille '+ars(e.montGuille):'';
    return '<div class="entry"><div class="entry-top"><div style="min-width:0;flex:1;"><div class="entry-name">'+e.detalle+'</div><div class="entry-sub">'+e.tarjeta+'</div></div><div class="entry-right"><div class="entry-amount">'+ars(e.importe)+'</div><button type="button" class="edit-btn" data-id="'+e.id+'">✏️</button><button type="button" class="del-btn" data-id="'+e.id+'">✕</button></div></div><div class="entry-meta"><span class="badge b-cuota">'+cuotaLabel+'</span>'+(e.compartido==='Si'?'<span class="badge b-comp">'+compLabel+'</span>':'')+'<span class="edate">'+new Date(e.fecha).toLocaleDateString('es-AR',{day:'numeric',month:'short'})+'</span></div></div>';
  }).join('');
  el.querySelectorAll('.edit-btn').forEach(function(b){b.addEventListener('click',function(){editEntry(this.getAttribute('data-id'));});});
  el.querySelectorAll('.del-btn').forEach(function(b){b.addEventListener('click',function(){delEntry(this.getAttribute('data-id'));});});
}

function renderRes(){
  var key=document.getElementById('rmes').value;
  var list=entries.filter(function(e){return mk(e.fecha)===key;});
  if(!list.length){document.getElementById('rcontent').innerHTML='<div class="empty">Sin registros este mes</div>';return;}
  var totalSofi=0,totalGuille=0,totalComp=0;
  var porTarjeta={};
  TARJETAS.forEach(function(t){porTarjeta[t]={total:0,sofi:0,guille:0,comp:0};});
  list.forEach(function(e){
    var pt=porTarjeta[e.tarjeta];
    if(!pt)return;
    pt.total+=e.importe;
    if(e.compartido==='Si'){
      pt.sofi+=e.montSofi;pt.guille+=e.montGuille;pt.comp+=e.importe;
      totalSofi+=e.montSofi;totalGuille+=e.montGuille;totalComp+=e.importe;
    } else {
      var esSofi=e.tarjeta.indexOf('Sofi')>=0;
      if(esSofi){pt.sofi+=e.importe;totalSofi+=e.importe;}
      else{pt.guille+=e.importe;totalGuille+=e.importe;}
    }
  });
  var h='<div class="stat-grid"><div class="stat"><div class="slabel">Le toca a Sofi</div><div class="sval" style="color:#C9406A;">'+ars(totalSofi)+'</div></div><div class="stat"><div class="slabel">Le toca a Guille</div><div class="sval" style="color:#2563EB;">'+ars(totalGuille)+'</div></div><div class="stat"><div class="slabel">Total mes</div><div class="sval red">'+ars(totalSofi+totalGuille)+'</div></div><div class="stat"><div class="slabel">Compartido</div><div class="sval">'+ars(totalComp)+'</div></div></div>';
  h+='<div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;">Por tarjeta</div>';
  TARJETAS.forEach(function(t){
    var pt=porTarjeta[t];
    if(pt.total===0)return;
    h+='<div class="tarjeta-card"><div class="tarjeta-name">'+t+'</div>';
    h+='<div class="tarjeta-row"><span class="tarjeta-label">Total</span><span class="tarjeta-val red">'+ars(pt.total)+'</span></div>';
    if(pt.comp>0)h+='<div class="tarjeta-row"><span class="tarjeta-label">Compartido</span><span class="tarjeta-val">'+ars(pt.comp)+'</span></div>';
    h+='<div class="tarjeta-row"><span class="tarjeta-label">Le toca a Sofi</span><span class="tarjeta-val sofi">'+ars(pt.sofi)+'</span></div>';
    h+='<div class="tarjeta-row"><span class="tarjeta-label">Le toca a Guille</span><span class="tarjeta-val guille">'+ars(pt.guille)+'</span></div>';
    h+='</div>';
  });
  document.getElementById('rcontent').innerHTML=h;
}

function delEntry(id){
  if(!confirm('¿Eliminás este gasto?'))return;
  post({action:'delete',id:id},function(ok){
    if(ok){toast('Eliminado');setTimeout(function(){load(renderHist);},2000);}
    else toast('Error al eliminar');
  });
}

document.getElementById('hdate').textContent=new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
document.getElementById('fecha').value=todayStr();
load();
</script>

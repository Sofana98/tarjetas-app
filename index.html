.save-btn:disabled { opacity: 0.45; }
.cancel-btn { width: 100%; padding: 13px; background: transparent; color: #888; border: 1px solid #E0DDD6; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 8px; touch-action: manipulation; }
.edit-banner { background: #EFF6FF; border: 1px solid #BFDBFE; border-radius: 10px; padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: #2563EB; font-weight: 600; }
.subs-info { background: #F5F3FF; border: 1px solid #DDD6FE; border-radius: 10px; padding: 10px 14px; margin-top: 8px; font-size: 13px; color: #6D28D9; line-height: 1.6; }
.month-sel { margin-bottom: 12px; }

.entry-name { font-size: 15px; font-weight: 600; color: #1A1916; }
.entry-sub { font-size: 12px; color: #888; margin-top: 2px; }
.entry-right { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.entry-amount { font-size: 16px; font-weight: 700; color: #DC2626; }
.edit-btn { background: none; border: none; color: #aaa; cursor: pointer; font-size: 15px; padding: 4px 5px; touch-action: manipulation; }
.del-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 16px; padding: 4px 5px; touch-action: manipulation; }
.entry-meta { display: flex; gap: 5px; margin-top: 7px; flex-wrap: wrap; align-items: center; }
.badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
.b-cuota { background: #FFF7ED; color: #C2410C; }
.b-comp { background: #F0FDF4; color: #16A34A; }
.b-subs { background: #F5F3FF; color: #6D28D9; }
.b-sofi { background: #FDF0F4; color: #C9406A; }
.b-guille { background: #EFF6FF; color: #2563EB; }
.edate { font-size: 11px; color: #aaa; }
.empty { text-align: center; padding: 40px 20px; color: #aaa; font-size: 14px; }
.lmsg { text-align: center; padding: 32px; color: #aaa; font-size: 14px; }
.mes-card { background: #fff; border: 1px solid #E8E4DC; border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; }
.mes-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.mes-titulo { font-size: 15px; font-weight: 700; color: #1A1916; }
.mes-total { font-size: 15px; font-weight: 700; color: #DC2626; }

.mes-val.guille { color: #2563EB; }

<!-- LOGIN -->
<div id="login-screen" class="login-screen">
  <div class="login-title">\ud83d\udcb3 Tarjetas S&G</div>
  <div class="login-sub">\u00bfQui\u00e9n sos?</div>
  <div class="login-btns">
    <button class="login-btn sofi" onclick="setUsuario('Sofi')">Sofi</button>
    <button class="login-btn guille" onclick="setUsuario('Guille')">Guille</button>
  </div>
</div>

<!-- APP -->
<div id="main-app" class="app" style="display:none">
  <div class="header">
    <div class="header-left">
      <div class="header-title">Tarjetas S&G</div>
      <div class="header-user" id="header-user"></div>
    </div>
    <div class="header-right">
      <div class="sync-pill syncing" id="spill">
        <div class="sync-dot blink" id="sdot"></div>
        <span id="stxt">Conectando</span>
      </div>
      <button class="switch-btn" onclick="cambiarUsuario()">Cambiar</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" id="tbtn-cargar">Cargar</div>
    <div class="tab" id="tbtn-historial">Historial</div>
    <div class="tab" id="tbtn-resumen">Resumen</div>
  </div>
  <div class="content">
    <div id="tab-cargar" class="section active">
      <div id="edit-banner" class="edit-banner" style="display:none">\u270f\ufe0f Editando \u2014 modific\u00e1 los campos y guard\u00e1</div>
      <div class="card">
        <div class="field">
          <label>Tarjeta</label>
          <select id="tarjeta"></select>
        </div>
        <div class="field">
          <label>Fecha primera cuota</label>
          <input type="date" id="fecha" />
        </div>
        <div class="field">
          <label>Detalle</label>
          <input type="text" id="detalle" placeholder="Ej: Netflix, ropa, supermercado..." autocomplete="off" />
        </div>
        <div class="field">
          <label>Importe por cuota ($)</label>
          <input type="number" id="importe" placeholder="0" inputmode="decimal" min="0" />
        </div>
        <div class="field">
          <label>Cuotas restantes</label>
          <select id="cuotas">
            <option value="1">1 cuota (contado)</option>
            <option value="2">2 cuotas</option>
            <option value="3">3 cuotas</option>
            <option value="4">4 cuotas</option>
            <option value="5">5 cuotas</option>
            <option value="6">6 cuotas</option>
            <option value="7">7 cuotas</option>
            <option value="8">8 cuotas</option>
            <option value="9">9 cuotas</option>
            <option value="10">10 cuotas</option>
            <option value="11">11 cuotas</option>
            <option value="12">12 cuotas</option>
            <option value="18">18 cuotas</option>
            <option value="24">24 cuotas</option>
          </select>
        </div>
        <div class="field">
          <label>Tipo de gasto</label>
          <div class="toggle-row">
            <button type="button" class="tb sel" data-group="tipo" data-val="propio">Solo m\u00edo</button>
            <button type="button" class="tb" data-group="tipo" data-val="compartido">Compartido</button>
            <button type="button" class="tb" data-group="tipo" data-val="suscripcion">Suscripci\u00f3n</button>
          </div>
        </div>
        <div class="field" id="comp-field" style="display:none">
          <label>\u00bfCu\u00e1nto paga cada uno por cuota?</label>
          <div class="porc-row">
            <span class="porc-label" style="color:#C9406A;" id="label-sofi">Sofi $</span>
            <input type="number" id="porc-sofi" placeholder="0" inputmode="decimal" min="0" />
          </div>
          <div class="porc-row">
            <span class="porc-label" style="color:#2563EB;" id="label-guille">Guille $</span>
            <input type="number" id="porc-guille" placeholder="0" inputmode="decimal" min="0" />
          </div>
        </div>
        <div class="field" id="subs-field" style="display:none">
          <label>Suscripci\u00f3n</label>
          <select id="subs-tipo" onchange="updateSubsInfo()">
            <option value="prime">Prime Video (Sofi, Guille, Santi)</option>
            <option value="youtube">YouTube (Sofi, Guille, Santi, Pablo, Alicia, Fran)</option>
          </select>
          <div class="subs-info" id="subs-info"></div>
        </div>
      </div>
      <button type="button" class="save-btn" id="savebtn">Guardar</button>
      <button type="button" class="cancel-btn" id="cancelbtn" style="display:none">Cancelar edici\u00f3n</button>
    </div>
    <div id="tab-historial" class="section">
      <div class="month-sel"><select id="hmes"></select></div>
      <div class="card" id="hlist"><div class="lmsg">Cargando...</div></div>
    </div>
    <div id="tab-resumen" class="section">
      <div id="rcontent"><div class="lmsg">Cargando...</div></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
